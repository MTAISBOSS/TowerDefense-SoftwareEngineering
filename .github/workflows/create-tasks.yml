name: Create GitHub Issues from tasks.md

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create issues from tasks.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const filePath = 'tasks.md';

            if (!fs.existsSync(filePath)) {
              core.setFailed('tasks.md file not found');
              return;
            }

            const content = fs.readFileSync(filePath, 'utf8');
            const lines = content.split('\n');

            let currentSection = '';
            const tasks = [];

            for (let line of lines) {
              line = line.trim();

              // Section detection
              if (line.startsWith('## ')) {
                currentSection = line.replace(/^## /, '').trim();
                continue;
              }

              // Skip completed tasks
              if (line.startsWith('- [x]')) continue;

              if (line.startsWith('- ')) {
                let taskText = line;

                // Normalize checkbox
                taskText = taskText.replace(/^- \[[ xX]\] /, '');
                taskText = taskText.replace(/^- /, '').trim();

                if (!taskText) continue;

                // Extract assignees
                const mentionRegex = /@([a-zA-Z0-9-]+)/g;
                let assignees = [];
                let match;

                while ((match = mentionRegex.exec(taskText)) !== null) {
                  assignees.push(match[1]);
                }

                assignees = [...new Set(assignees)];

                // Remove mentions from title
                taskText = taskText.replace(/@[a-zA-Z0-9-]+/g, '').trim();

                const title = currentSection
                  ? `${currentSection} | ${taskText}`
                  : taskText;

                tasks.push({
                  title,
                  section: currentSection,
                  assignees
                });
              }
            }

            if (tasks.length === 0) {
              core.info('No tasks found in tasks.md');
              return;
            }

            // Get existing issues
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });

            const existingTitles = new Set(
              existingIssues.data.map(issue => issue.title)
            );

            // Get existing labels
            const existingLabelsResponse = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const existingLabels = new Set(
              existingLabelsResponse.data.map(label => label.name.toLowerCase())
            );

            // Helper to normalize label names
            const normalizeLabel = (name) => name.trim();

            for (const task of tasks) {
              if (existingTitles.has(task.title)) {
                core.info(`Skipping existing issue: ${task.title}`);
                continue;
              }

              const labelName = task.section ? normalizeLabel(task.section) : null;

              // Create label if missing
              if (labelName && !existingLabels.has(labelName.toLowerCase())) {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: labelName,
                    color: 'ededed', // neutral gray
                  });

                  existingLabels.add(labelName.toLowerCase());
                  core.info(`Created label: ${labelName}`);
                } catch (error) {
                  core.warning(`Failed to create label "${labelName}": ${error.message}`);
                }
              }

              core.info(`Creating issue: ${task.title}`);

              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: task.title,
                body: [
                  'Created automatically from tasks.md',
                  '',
                  `## Section`,
                  task.section || 'None'
                ].join('\n'),
                labels: labelName ? [labelName] : []
              });

              if (task.assignees.length > 0) {
                try {
                  await github.rest.issues.addAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.data.number,
                    assignees: task.assignees
                  });

                  core.info(`Assigned to: ${task.assignees.join(', ')}`);
                } catch (error) {
                  core.warning(
                    `Failed to assign "${task.title}" → ${task.assignees.join(', ')}: ${error.message}`
                  );
                }
              }
            }